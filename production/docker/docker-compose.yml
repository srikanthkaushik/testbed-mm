# MMUCC v5 — Production Docker Compose
# Copy to /opt/mmucc/app/docker-compose.yml on the EC2 instance.
# All secrets are injected via the .env file (never committed to git).

services:

  mysql:
    image: mysql:8.0
    container_name: mmucc-mysql
    restart: unless-stopped
    network_mode: host
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - /opt/mmucc/mysql-data:/var/lib/mysql
    command:
      - --innodb-buffer-pool-size=64M
      - --max-connections=50
      - --performance-schema=OFF
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  auth-service:
    image: ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/mmucc/auth-service:${IMAGE_TAG:-latest}
    container_name: mmucc-auth
    restart: unless-stopped
    network_mode: host
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      JAVA_OPTS: -Xms32m -Xmx160m -XX:MaxMetaspaceSize=80m -XX:+UseSerialGC
      SPRING_DATASOURCE_URL: jdbc:mysql://127.0.0.1:3306/${DB_NAME}?useSSL=false&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      MMUCC_JWT_SECRET: ${JWT_SECRET}
      MMUCC_JWT_ISSUER: ${JWT_ISSUER}
      FIREBASE_SERVICE_ACCOUNT_PATH: /config/firebase-service-account.json
      SPRING_JPA_HIBERNATE_DDL_AUTO: none
      SPRING_FLYWAY_BASELINE_ON_MIGRATE: "true"
      SPRING_FLYWAY_BASELINE_VERSION: "2"
      SERVER_PORT: 8081
    volumes:
      - /opt/mmucc/config:/config:ro
      - /opt/mmucc/logs/auth:/logs
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  crash-service:
    image: ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/mmucc/crash-service:${IMAGE_TAG:-latest}
    container_name: mmucc-crash
    restart: unless-stopped
    network_mode: host
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      JAVA_OPTS: -Xms32m -Xmx192m -XX:MaxMetaspaceSize=160m -XX:+UseSerialGC
      SPRING_DATASOURCE_URL: jdbc:mysql://127.0.0.1:3306/${DB_NAME}?useSSL=false&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      MMUCC_JWT_SECRET: ${JWT_SECRET}
      MMUCC_JWT_ISSUER: ${JWT_ISSUER}
      SPRING_FLYWAY_BASELINE_ON_MIGRATE: "true"
      SPRING_FLYWAY_BASELINE_VERSION: "7"
      SPRING_JPA_HIBERNATE_DDL_AUTO: none
      SERVER_PORT: 8082
    volumes:
      - /opt/mmucc/logs/crash:/logs
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  reference-service:
    image: ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/mmucc/reference-service:${IMAGE_TAG:-latest}
    container_name: mmucc-reference
    restart: unless-stopped
    network_mode: host
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      JAVA_OPTS: -Xms32m -Xmx128m -XX:MaxMetaspaceSize=80m -XX:+UseSerialGC
      SPRING_DATASOURCE_URL: jdbc:mysql://127.0.0.1:3306/${DB_NAME}?useSSL=false&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      MMUCC_JWT_SECRET: ${JWT_SECRET}
      MMUCC_JWT_ISSUER: ${JWT_ISSUER}
      SERVER_PORT: 8083
    volumes:
      - /opt/mmucc/logs/reference:/logs
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  report-service:
    image: ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/mmucc/report-service:${IMAGE_TAG:-latest}
    container_name: mmucc-report
    restart: unless-stopped
    network_mode: host
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      JAVA_OPTS: -Xms32m -Xmx192m -XX:MaxMetaspaceSize=80m -XX:+UseSerialGC
      SPRING_DATASOURCE_URL: jdbc:mysql://127.0.0.1:3306/${DB_NAME}?useSSL=false&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      MMUCC_JWT_SECRET: ${JWT_SECRET}
      MMUCC_JWT_ISSUER: ${JWT_ISSUER}
      SERVER_PORT: 8084
    volumes:
      - /opt/mmucc/logs/report:/logs
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

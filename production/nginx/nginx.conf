# MMUCC v5 — Nginx Production Configuration
# Replace DOMAIN_PLACEHOLDER with your actual DuckDNS subdomain before deploying.
# Deploy: sudo cp nginx.conf /etc/nginx/sites-available/mmucc

# ── Upstream services ────────────────────────────────────────────────────────

upstream auth_service {
    server 127.0.0.1:8081;
    keepalive 16;
}

upstream crash_service {
    server 127.0.0.1:8082;
    keepalive 16;
}

upstream reference_service {
    server 127.0.0.1:8083;
    keepalive 16;
}

upstream report_service {
    server 127.0.0.1:8084;
    keepalive 16;
}

# ── HTTP → HTTPS redirect ────────────────────────────────────────────────────

server {
    listen 80;
    listen [::]:80;
    server_name DOMAIN_PLACEHOLDER;
    return 301 https://$host$request_uri;
}

# ── HTTPS server ─────────────────────────────────────────────────────────────

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name DOMAIN_PLACEHOLDER;

    # ── SSL ──────────────────────────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/DOMAIN_PLACEHOLDER/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/DOMAIN_PLACEHOLDER/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # ── Security headers ─────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "DENY" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    # ── Proxy common settings ────────────────────────────────────────────────
    proxy_http_version 1.1;
    proxy_set_header   Connection        "";
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
    proxy_send_timeout 60s;
    client_max_body_size 10m;

    # ── Auth service: /auth/** and /admin/** ─────────────────────────────────
    location /auth {
        proxy_pass http://auth_service;
    }

    location /admin {
        proxy_pass http://auth_service;
    }

    # ── Crash service: /crashes/** ───────────────────────────────────────────
    location /crashes {
        proxy_pass http://crash_service;
        # PDF and large payloads
        proxy_read_timeout 120s;
    }

    # ── Reference service: /lookups/** ───────────────────────────────────────
    location /lookups {
        proxy_pass http://reference_service;
    }

    # ── Report service: /reports/** ──────────────────────────────────────────
    location /reports {
        proxy_pass http://report_service;
        # PDF generation can be slow
        proxy_read_timeout 120s;
        proxy_buffering off;
    }

    # ── Angular SPA: everything else ─────────────────────────────────────────
    root /var/www/mmucc-app;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }

    # Long-cache hashed assets produced by Angular build
    location ~* \.(js|css|woff2?|ttf|eot|svg|png|jpg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Logging ──────────────────────────────────────────────────────────────
    access_log /var/log/nginx/mmucc-access.log;
    error_log  /var/log/nginx/mmucc-error.log warn;
}

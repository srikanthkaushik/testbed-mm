<!-- Skip to main content link (WCAG 2.4.1) -->
<a class="skip-link" href="#main-content">Skip to main content</a>

<!-- ── Top Navbar ──────────────────────────────────────────────── -->
<header class="navbar" role="banner">
  <div class="navbar__start">
    <button
      type="button"
      class="navbar__hamburger"
      (click)="toggleSidebar()"
      [attr.aria-expanded]="sidebarOpen()"
      aria-controls="sidebar"
      aria-label="Toggle navigation"
    >
      <!-- Hamburger icon -->
      <svg aria-hidden="true" focusable="false" width="20" height="20" viewBox="0 0 20 20" fill="currentColor">
        <rect x="2" y="4"  width="16" height="2" rx="1"/>
        <rect x="2" y="9"  width="16" height="2" rx="1"/>
        <rect x="2" y="14" width="16" height="2" rx="1"/>
      </svg>
    </button>
    <span class="navbar__brand" aria-label="MMUCC Crash Reporting">MMUCC</span>
  </div>

  <div class="navbar__end">
    @if (currentUser()) {
      <div class="navbar__user" aria-label="Signed-in user">
        <span class="navbar__user-name">{{ displayName() }}</span>
        <span class="navbar__role-badge" [attr.data-role]="currentUser()?.roleCode">
          {{ roleLabel() }}
        </span>
      </div>
    }
    <button
      type="button"
      class="navbar__logout"
      (click)="logout()"
      aria-label="Sign out"
    >
      <!-- Logout icon -->
      <svg aria-hidden="true" focusable="false" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
        <polyline points="16 17 21 12 16 7"/>
        <line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
      <span class="navbar__logout-label">Sign out</span>
    </button>
  </div>
</header>

<!-- ── Layout body (sidebar + main) ──────────────────────────── -->
<div class="layout">

  <!-- Mobile overlay backdrop -->
  @if (isMobile() && sidebarOpen()) {
    <div
      class="sidebar-backdrop"
      (click)="closeSidebarOnMobile()"
      aria-hidden="true"
    ></div>
  }

  <!-- ── Sidebar ──────────────────────────────────────────────── -->
  <nav
    id="sidebar"
    class="sidebar"
    [class.sidebar--open]="sidebarOpen()"
    aria-label="Primary navigation"
  >
    <ul class="sidebar__nav" role="list">

      <!-- Dashboard -->
      <li class="sidebar__item">
        <a
          routerLink="/dashboard"
          routerLinkActive="sidebar__link--active"
          [routerLinkActiveOptions]="{ exact: true }"
          [attr.aria-current]="null"
          #dashboardLink="routerLinkActive"
          [attr.aria-current]="dashboardLink.isActive ? 'page' : null"
          class="sidebar__link"
          (click)="closeSidebarOnMobile()"
        >
          <svg class="sidebar__icon" aria-hidden="true" focusable="false" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
            <polyline points="9 22 9 12 15 12 15 22"/>
          </svg>
          <span class="sidebar__label">Dashboard</span>
        </a>
      </li>

      <!-- Crashes -->
      <li class="sidebar__item">
        <a
          routerLink="/crashes"
          routerLinkActive="sidebar__link--active"
          #crashesLink="routerLinkActive"
          [attr.aria-current]="crashesLink.isActive ? 'page' : null"
          class="sidebar__link"
          (click)="closeSidebarOnMobile()"
        >
          <svg class="sidebar__icon" aria-hidden="true" focusable="false" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="1" y="3" width="15" height="13" rx="2"/>
            <path d="M16 8h4l3 3v5h-7V8z"/>
            <circle cx="5.5" cy="18.5" r="2.5"/>
            <circle cx="18.5" cy="18.5" r="2.5"/>
          </svg>
          <span class="sidebar__label">Crashes</span>
        </a>
      </li>

      <!-- Reports (disabled for DATA_ENTRY role) -->
      <li class="sidebar__item">
        @if (reportsEnabled()) {
          <a
            routerLink="/reports"
            routerLinkActive="sidebar__link--active"
            #reportsLink="routerLinkActive"
            [attr.aria-current]="reportsLink.isActive ? 'page' : null"
            class="sidebar__link"
            (click)="closeSidebarOnMobile()"
          >
            <svg class="sidebar__icon" aria-hidden="true" focusable="false" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="18" y1="20" x2="18" y2="10"/>
              <line x1="12" y1="20" x2="12" y2="4"/>
              <line x1="6"  y1="20" x2="6"  y2="14"/>
            </svg>
            <span class="sidebar__label">Reports</span>
          </a>
        } @else {
          <span
            class="sidebar__link sidebar__link--disabled"
            aria-disabled="true"
            title="Reports are not available for your role"
          >
            <svg class="sidebar__icon" aria-hidden="true" focusable="false" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="18" y1="20" x2="18" y2="10"/>
              <line x1="12" y1="20" x2="12" y2="4"/>
              <line x1="6"  y1="20" x2="6"  y2="14"/>
            </svg>
            <span class="sidebar__label">Reports</span>
          </span>
        }
      </li>

      <!-- Admin (ADMIN role only) -->
      @if (showAdmin()) {
        <li class="sidebar__item">
          <a
            routerLink="/admin/users"
            routerLinkActive="sidebar__link--active"
            #adminLink="routerLinkActive"
            [attr.aria-current]="adminLink.isActive ? 'page' : null"
            class="sidebar__link"
            (click)="closeSidebarOnMobile()"
          >
            <svg class="sidebar__icon" aria-hidden="true" focusable="false" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
              <circle cx="9" cy="7" r="4"/>
              <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
              <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
            </svg>
            <span class="sidebar__label">Admin</span>
          </a>
        </li>
      }

    </ul>
  </nav>

  <!-- ── Main content area ─────────────────────────────────────── -->
  <main id="main-content" class="main-content" tabindex="-1">
    <router-outlet />
  </main>

</div>

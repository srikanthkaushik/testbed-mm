spring:
  application:
    name: mmucc-crash-service

  datasource:
    url: ${MMUCC_DB_URL:jdbc:mysql://localhost:3306/mmucc_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
    username: ${MMUCC_DB_USER}
    password: ${MMUCC_DB_PASSWORD}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000

  jpa:
    hibernate:
      ddl-auto: validate  # Flyway owns the schema; Hibernate only validates on startup
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    validate-on-migrate: true

mmucc:
  jwt:
    # Base64-encoded 256-bit key shared with auth-service. MUST match MMUCC_JWT_SECRET.
    secret: ${MMUCC_JWT_SECRET}
    access-token-expiration-ms: 900000   # 15 minutes (for filter validation only)
    issuer: mmucc-auth-service
  cors:
    allowed-origins: ${MMUCC_CORS_ORIGINS:http://localhost:4200}

server:
  port: 8082
  servlet:
    context-path: /
  error:
    include-message: never
    include-stacktrace: never

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    gov.nhtsa.mmucc: INFO
    org.springframework.security: WARN
    org.flywaydb: INFO

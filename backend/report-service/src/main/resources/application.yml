spring:
  application:
    name: mmucc-report-service

  datasource:
    url: ${MMUCC_DB_URL:jdbc:mysql://localhost:3306/mmucc_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
    username: ${MMUCC_DB_USER}
    password: ${MMUCC_DB_PASSWORD}
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: none
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  # No Flyway — report-service is read-only and uses crash-service's schema
  flyway:
    enabled: false

mmucc:
  jwt:
    secret: ${MMUCC_JWT_SECRET:bG9jYWwtZGV2LXNlY3JldC1rZXktbXVzdC1iZS0yNTYtYml0cw==}
    issuer: mmucc-auth-service
  cors:
    allowed-origins: ${MMUCC_CORS_ORIGINS:http://localhost:4200}

server:
  port: 8084
  servlet:
    context-path: /
  error:
    include-message: never
    include-stacktrace: never

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    gov.nhtsa.mmucc: INFO
    org.springframework.security: WARN

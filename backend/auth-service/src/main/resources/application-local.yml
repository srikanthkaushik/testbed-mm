# Local developer overrides. Do NOT commit real credentials.
# Copy this pattern to your ~/.mmucc/local-env or set env vars in your IDE run config.

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/mmucc_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: mmucc_user
    password: changeme
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

firebase:
  # Place your downloaded service account JSON here (not in the project directory)
  service-account-path: ${user.home}/.mmucc/firebase-service-account.json

mmucc:
  jwt:
    # Generate a secure key: openssl rand -base64 32
    secret: bG9jYWwtZGV2LXNlY3JldC1rZXktbXVzdC1iZS0yNTYtYml0cw==
  cors:
    allowed-origins: http://localhost:4200

logging:
  level:
    gov.nhtsa.mmucc: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql: TRACE
